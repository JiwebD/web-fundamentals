<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            width:150px;
            height : 250px;
        }

    </style>
</head>
<body>
    

    <!-- JPG 이미지 -->
    <!-- 비트맵(pixels) 기반, 사진/풍경에 적합, 확대하면 깨짐, 용량 작음 -->
    <img src="./images/dog.jpg"  alt="강아지 사진" />
    <hr>

    <!-- SVG 이미지 -->
    <!-- 벡터(점과 선) 기반, 로고/아이콘에 적합, 확대해도 선명, CSS/JS로 색상 변경 가능 -->
    <img src="./images/cat.svg" alt="고양이 아이콘" />
</body>
</html>
